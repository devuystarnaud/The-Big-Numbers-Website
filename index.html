<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="main.css" rel="stylesheet">
    <title>The Big Numbers Website</title>
</head>
<body>
    <h1>The Big Numbers Website by Arnaud De Vuyst</h1>
    <p>
        Put your number here to convert to text (short-range / english syntax) <br> 
        Tip: use the scientific notation to write big numbers:<br>
        For example, 1.5e8 is 1.5*10**8 which is 150 million !
    </p>
    <form id="form1"> 
        <input id="number-form" type="number">
        <input type="submit" value="Go">
    </form>
    <p>Your number can be humanly read as : <strong id="result-number"> &lt;Insert number !&gt;</strong></p>
 
    <script src="main.js"></script>
</body>
</html>
